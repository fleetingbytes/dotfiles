<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>

  <!-- Monospace with emoji fallback -->
  <alias>
    <family>monospace</family>
    <prefer>
      <family>Hack Nerd Font Mono</family>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Explicit emoji family -->
  <alias>
    <family>emoji</family>
    <prefer>
      <family>Noto Color Emoji</family>
    </prefer>
  </alias>

  <!-- Force emoji for und-zsye -->
  <match target="pattern">
    <test name="lang" qual="any" compare="contains">
      <string>und-zsye</string>
    </test>
    <edit name="family" mode="prepend_first" binding="strong">
      <string>Noto Color Emoji</string>
    </edit>
    <edit name="color" mode="assign" binding="strong">
      <bool>true</bool>
    </edit>
  </match>

</fontconfig>
