# Scripts in .chezmoiscripts will use this data to install the appropriate
# packages on a given platform.
packages:
  linux:
    termux:
      pkg:
        - zsh
        - man
        - which
        - eza
        - bat
        - vim
        - gh
        - ffmpeg
        - starship
      pip:
        - yt-dlp
  unix_like:
    cargo:
      pkg:
        - bat
        - eza
        - starship
